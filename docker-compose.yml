services:
  agent:
    build: .
    container_name: my_persistent_agent
    volumes:
      - ./app:/app            # 将宿主机的 app 目录映射到容器的 /app
      - ./.env:/app/.env      # 将宿主机的 .env 文件精准映射到容器的 /app/.env
    env_file:
      - .env
    ports:
      - "${APP_PORT:-9090}:${APP_PORT:-9090}"   # 通过 .env 的 APP_PORT 控制
    restart: always
    stop_grace_period: 8s   # 给 lifespan 取消 polling task 的时间（poll 超时 5s + 余量）