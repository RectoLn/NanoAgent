services:
  agent:
    build: .
    container_name: my_persistent_agent
    volumes:
      - ./app:/app            # 将宿主机的 app 目录映射到容器的 /app
      - ./.env:/app/.env      # 将宿主机的 .env 文件精准映射到容器的 /app/.env
    env_file:
      - .env
    ports:
      - "9090:9090"           # 暴露 FastAPI 服务端口到宿主机
    tty: true
    stdin_open: true
    command: /bin/bash
    restart: always