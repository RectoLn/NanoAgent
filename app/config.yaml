# Agent 配置文件
# 运行时配置项，与代码分离

# 默认聊天 provider（用户首次打开页面时显示）
# 用户在前端切换后会保存到浏览器 localStorage，优先于此配置
default:
  provider: "deepseek"

# Provider presets（公开配置；密钥仍放在 .env）
providers:
  deepseek:
    label: "DeepSeek"
    base_url: "https://api.deepseek.com"
    default_model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"

  kilo:
    label: "Kilo"
    base_url: "https://api.kilo.ai/api/gateway"
    default_model: "kilo-auto/free"
    api_key_env: "KILO_API_KEY"

  ollama:
    label: "Ollama"
    base_url: "http://host.docker.internal:11434/v1"
    default_model: "qwen3:8b"
    api_key_env: null

  custom:
    label: "Custom"
    base_url: null
    default_model: null
    api_key_env: "LLM_API_KEY"

# Agent 配置
agent:
  max_steps: 200
  temperature: 0.1
  # 单次 LLM 调用允许输出的最大 token 数
  max_tokens: 16384
  # 连续 N 轮未调用 todo 工具则注入 <reminder>
  nag_threshold: 3

# LLM 配置
llm:
  stop_sequences:
    - "Observation:"
    - "<END_OF_ACTION>"
    - "<END_OF_ACTION"
    - "</END_OF_ACTION"

# Prompt 文件路径（相对于 app 目录）
prompts:
  system: "prompts/system.md"

# 上下文压缩配置 - 三层策略
compression:
  # 全局开关
  enabled: true

  # ── Layer 1 配置 ─────────────────────────────────────────────
  layer1:
    # 保留最近 N 条 tool 结果不截断
    keep_recent_tool_messages: 3
    # tool 消息 content 长度超过此值（字符数）的旧消息将被截断
    content_threshold: 200

  # ── Layer 2 配置 ─────────────────────────────────────────────
  layer2:
    # 触发阈值（满足任一条件即触发）
    #   - 估算 token 数（词数 × 1.3）超过 token_threshold
    #   - 非 system 消息条数超过 message_threshold
    token_threshold: 50000
    message_threshold: 100

    # 摘要生成参数
    summary:
      prompt: "compression_summary.md"
      fallback_prompt: "compression_summary_fallback.md"
      subagent_hint_prompt: "compression_subagent_hint.md"
      temperature: 0.1
      max_tokens: 1200  # 摘要模型的常规输出预算
      retry_max_tokens: 2400  # 若因 length 被截断且内容为空，自动用更大预算重试一次
      max_chars: 1200  # 压缩后摘要保留足够任务上下文
