# Agent 配置文件
# 运行时配置项，与代码分离

# 默认模型（用户首次打开页面时显示的模型）
# 格式："provider:model_id"，provider 可选 kilo / deepseek
# 用户在前端切换后会保存到浏览器，优先于此配置
default:
  model: "kilo:kilo-auto/free"

# Agent 配置
agent:
  max_steps: 200
  temperature: 0.1
  # 单次 LLM 调用允许输出的最大 token 数
  max_tokens: 16384
  # 连续 N 轮未调用 todo 工具则注入 <reminder>
  nag_threshold: 3

# LLM 配置
llm:
  stop_sequences:
    - "Observation:"
    - "<END_OF_ACTION>"
    - "<END_OF_ACTION"
    - "</END_OF_ACTION"

# Prompt 文件路径（相对于 app 目录）
prompts:
  system: "prompts/system.md"

# 上下文压缩配置 - 三层策略
compression:
  # 全局开关
  enabled: true

  # ── Layer 1 配置 ─────────────────────────────────────────────
  layer1:
    # 保留最近 N 条 tool 结果不截断
    keep_recent_tool_messages: 3
    # tool 消息 content 长度超过此值（字符数）的旧消息将被截断
    content_threshold: 100

  # ── Layer 2 配置 ─────────────────────────────────────────────
  layer2:
    # 触发阈值（满足任一条件即触发）
    #   - 估算 token 数（词数 × 1.3）超过 token_threshold
    #   - 非 system 消息条数超过 message_threshold
    token_threshold: 3000
    message_threshold: 30

    # 摘要生成参数
    summary:
      temperature: 0.1
      max_tokens: 1000
      max_chars: 800